name: Build Firmware

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Cache PlatformIO
      uses: actions/cache@v4.2.3
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio

    - name: Set up Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        pip install platformio
    
    - name: Create secrets.h for CI build
      run: |
        cat > firmware/src/secrets.h << 'EOF'
        #ifndef SECRETS_H
        #define SECRETS_H
        #define GITHUB_TOKEN "${{ secrets.GH_ISSUES_TOKEN }}"
        #define DASHBOARD_URL "${{ secrets.DASHBOARD_URL }}"
        #define DASHBOARD_API_KEY "${{ secrets.DASHBOARD_API_KEY }}"
        #endif
        EOF

    - name: Build firmware
      run: |
        cd firmware
        pio run
    
    - name: Get version from code
      id: version
      run: |
        VERSION=$(grep '#define FIRMWARE_VERSION' firmware/src/version.h | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
    
    - name: Rename firmware binary
      run: |
        mkdir -p firmware/builds
        cp firmware/.pio/build/esp32dev/firmware.bin firmware/builds/firmware-${{ steps.version.outputs.version }}.bin
        cp firmware/.pio/build/esp32dev/firmware.bin firmware/builds/firmware-latest.bin
    
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4.6.2
      with:
        name: firmware-${{ steps.version.outputs.version }}
        path: firmware/builds/
    
    - name: Create/Update Release
      uses: softprops/action-gh-release@v2.3.2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Firmware v${{ steps.version.outputs.version }}
        files: |
          firmware/builds/firmware-${{ steps.version.outputs.version }}.bin
          firmware/builds/firmware-latest.bin
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
