name: Build Firmware

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        pip install platformio
    
    - name: Create PlatformIO project
      run: |
        cd firmware/src/Due
        cat > platformio.ini << 'EOINI'
        [env:esp32dev]
        platform = espressif32
        board = esp32dev
        framework = arduino
        monitor_speed = 115200
        lib_deps = 
            bblanchon/ArduinoJson@^6.21.3
        EOINI
    
    - name: Build firmware
      run: |
        cd firmware/src/Due
        pio run
    
    - name: Get version from code
      id: version
      run: |
        VERSION=$(grep '#define FIRMWARE_VERSION' firmware/src/Due/version.h | cut -d'"' -f2)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
    
    - name: Rename firmware binary
      run: |
        mkdir -p firmware/builds
        cp firmware/src/Due/.pio/build/esp32dev/firmware.bin firmware/builds/firmware-${{ steps.version.outputs.version }}.bin
        cp firmware/src/Due/.pio/build/esp32dev/firmware.bin firmware/builds/firmware-latest.bin
    
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ steps.version.outputs.version }}
        path: firmware/builds/
    
    - name: Create/Update Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Firmware v${{ steps.version.outputs.version }}
        files: |
          firmware/builds/firmware-${{ steps.version.outputs.version }}.bin
          firmware/builds/firmware-latest.bin
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
